<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Displayed Image</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #121212; /* Dark theme so your image stands out */
            padding: 20px;
        }
        img {
            max-width: 100%;
            max-height: 90vh;
            height: auto;
            object-fit: contain;
            border-radius: 8px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
        }
    </style>
</head>
<body>

    <!-- URL-encoded space (%20) guarantees the browser finds the file on GitHub -->
    <img src="Edited%20_20260516_160412_0000.png" alt="Hosted Image">

</body>
</html>
