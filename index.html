<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Viewer</title>
    <style>
        /* This ensures the image is centered and the page looks clean */
        body {
            margin: 0;
            padding: 0;
            background-color: #0e0e0e; /* Deep black background */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        img {
            max-width: 100%;
            max-height: 100vh;
            display: block;
            /* Adds a subtle fade-in effect when the page loads */
            animation: fadeIn 0.8s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>

    <img src="1.png" alt="My Image">

</body>
</html>
